<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  background: linear-gradient(to bottom right, #cffafe, #bfdbfe);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.weather-card {
  backdrop-filter: blur(10px);
  background: rgba(255, 255, 255, 0.9);
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center">

      <h1 class="fw-bold text-primary mb-2">
        <i class="fa-solid fa-cloud-sun"></i> Weather Forecast
      </h1>
      <p class="text-primary-emphasis mb-4">
        Enter a city name to get current weather information
      </p>
      <div class="input-group mb-3 shadow">
        <input type="text" id="cityInput" class="form-control form-control-lg" placeholder="Enter city name...">
        <button class="btn btn-primary btn-lg" onclick="getWeather()">
          <i class="fa-solid fa-magnifying-glass"></i> Search
        </button>
      </div>

      <div id="error"></div>
      <div id="weatherResult"></div>

    </div>
  </div>
</div>

<script>
function getWeather() {
  const city = document.getElementById("cityInput").value.trim();
  const errorDiv = document.getElementById("error");
  const resultDiv = document.getElementById("weatherResult");

  errorDiv.innerHTML = "";
  resultDiv.innerHTML = "";

  if (city === "") {
    errorDiv.innerHTML = `
      <div class="alert alert-danger">
        <i class="fa-solid fa-triangle-exclamation"></i> Please enter a city name
      </div>`;
    return;
  }

  const apiKey = "0ccda498d9a29288b77ba10879689b8a";
  const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

  fetch(url)
    .then(response => response.json())
    .then(data => {

      if (data.cod === "404") {
        errorDiv.innerHTML = `
          <div class="alert alert-danger">
            <i class="fa-solid fa-circle-xmark"></i> City not found!
          </div>`;
      } else {

        const temp = data.main.temp;
        const humidity = data.main.humidity;
        const weather = data.weather[0].description;
        const wind = data.wind.speed;
        const icon = data.weather[0].icon;

        resultDiv.innerHTML = `
          <div class="weather-card p-4 mt-4">
            <h2 class="fw-bold">${data.name}</h2>
            <img src="https://openweathermap.org/img/wn/${icon}@2x.png" alt="Weather Icon">
            <h3 class="display-5 fw-bold">${temp} °C</h3>
            <p class="text-capitalize">
              <i class="fa-solid fa-cloud"></i> ${weather}
            </p>
            <div class="row mt-3">
              <div class="col">
                <p><i class="fa-solid fa-droplet text-primary"></i> Humidity<br><strong>${humidity}%</strong></p>
              </div>
              <div class="col">
                <p><i class="fa-solid fa-wind text-info"></i> Wind Speed<br><strong>${wind} m/s</strong></p>
              </div>
            </div>
          </div>
        `;
      }
    })
    .catch(() => {
      errorDiv.innerHTML = `
        <div class="alert alert-danger">
          <i class="fa-solid fa-bug"></i> Error fetching weather data
        </div>`;
    });
}
document.getElementById("cityInput")
  .addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      getWeather();
    }
});
</script>

</body>
</html>
